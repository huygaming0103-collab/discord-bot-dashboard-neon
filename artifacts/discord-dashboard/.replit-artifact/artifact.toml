kind = "web"
previewPath = "/"
title = "Discord Bot Dashboard"
version = "1.0.0"
id = "artifacts/discord-dashboard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24327

[services.development]
run = "pnpm --filter @workspace/discord-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/discord-dashboard", "run", "build" ]
serve = "static"
publicDir = "artifacts/discord-dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24327"
BASE_PATH = "/"
